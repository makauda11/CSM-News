<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CSM News">
  <title>CSM News · Applivery</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --core: #0242E3;
      --deep: #010258;
      --accent: #00D9FF;
      --white: #FFFFFF;
      --gray-blue: #F2F6FE;
      --text: #010258;
      --text-muted: #6b7a9e;
      --border: #d8e2f8;
      --red: #ef4444;
      --yellow: #f59e0b;
      --green: #10b981;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--gray-blue);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--deep);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(2,66,227,0.25);
    }

    /* Grid overlay on header */
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    /* Applivery logo SVG inline */
    .logo-mark {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .logo-wordmark {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .header-sep {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.15);
    }

    .header-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .refresh-btn {
      background: var(--core);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: 0.2px;
      position: relative;
      z-index: 1;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: #0336c0; }

    /* ── WEEK BAR ── */
    .week-bar {
      background: var(--deep);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .week-txt {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .updated-chip {
      font-size: 11px;
      color: var(--accent);
      background: rgba(0,217,255,0.1);
      border: 1px solid rgba(0,217,255,0.25);
      padding: 3px 12px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      background: var(--deep);
      border-bottom: 2px solid var(--core);
    }

    .stat {
      padding: 20px 32px;
      border-right: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }
    .stat:last-child { border-right: none; }

    .stat-lbl {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .stat-val {
      font-size: 36px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 6px;
    }

    .stat.red .stat-val { color: #ff6b6b; }
    .stat.yellow .stat-val { color: #fbbf24; }
    .stat.green .stat-val { color: #10b981; }
    .stat.green::after { background: #10b981; }
    .stat.total .stat-val { color: var(--accent); }

    /* Accent bar on stat */
    .stat::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: transparent;
    }
    .stat.total::after { background: var(--accent); }
    .stat.red::after { background: #ff6b6b; }
    .stat.yellow::after { background: #fbbf24; }

    /* ── FILTERS ── */
    .filters-wrap {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filters-wrap::-webkit-scrollbar { display: none; }

    .fb {
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.15s;
    }
    .fb:hover { border-color: var(--core); color: var(--core); }
    .fb.fa { background: var(--core); color: var(--white); border-color: var(--core); }
    .fb.fr { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
    .fb.fy { background: #fffbeb; color: #d97706; border-color: #fde68a; }
    .fb.fg { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }

    .bdg {
      border-radius: 5px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(0,0,0,0.08);
    }
    .fb.fa .bdg { background: rgba(255,255,255,0.2); }

    /* ── CARDS ── */
    .cards { padding: 24px 32px; }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 16px;
      overflow: hidden;
      display: none;
      box-shadow: 0 2px 8px rgba(2,66,227,0.06);
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(2,66,227,0.12); }
    .card.show { display: block; }

    /* Card header */
    .ch {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--gray-blue);
      position: relative;
      overflow: hidden;
    }

    /* Colored left border */
    .ch::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
    }
    .ch.hg::before { background: var(--green); }
    .ch.hy::before { background: var(--yellow); }
    .ch.hr::before { background: var(--red); }

    /* Subtle bg tint */
    .ch.hg { background: linear-gradient(90deg, rgba(16,185,129,0.04) 0%, transparent 60%); }
    .ch.hy { background: linear-gradient(90deg, rgba(245,158,11,0.04) 0%, transparent 60%); }
    .ch.hr { background: linear-gradient(90deg, rgba(239,68,68,0.05) 0%, transparent 60%); }

    .lw {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--gray-blue);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .lw img { width: 28px; height: 28px; object-fit: contain; }
    .li {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--core), var(--deep));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .cn { font-weight: 700; font-size: 15px; color: var(--deep); line-height: 1.2; }
    .cm { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .hp {
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      padding: 4px 12px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: auto;
      letter-spacing: 0.3px;
    }
    .hpg { background: #dcfce7; color: #15803d; }
    .hpy { background: #fef3c7; color: #92400e; }
    .hpr { background: #fee2e2; color: #b91c1c; }

    /* Card body */
    .cb { padding: 18px 20px; }

    .sec {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--gray-blue);
    }
    .sec:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .lbl {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .txt { font-size: 13px; color: #4b5c7a; line-height: 1.7; }

    /* Boxes */
    .box {
      background: var(--gray-blue);
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid var(--border);
    }

    /* News items */
    .ni { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .ni:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .nt { font-size: 13px; font-weight: 600; color: var(--deep); margin-bottom: 3px; line-height: 1.5; }
    .nd { font-size: 11px; color: #b0b8d4; margin-bottom: 4px; }
    .ns { font-size: 12.5px; color: #4b5c7a; line-height: 1.65; }

    /* Risk box */
    .ra {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      font-size: 12px;
      color: #92400e;
      line-height: 1.65;
    }
    .ra-lbl {
      font-size: 9px;
      font-weight: 800;
      color: #d97706;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
    }

    /* Tickets */
    .tk { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-blue); }
    .tk:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .tt { font-size: 13px; font-weight: 600; color: var(--deep); margin-bottom: 4px; line-height: 1.4; }

    .tb {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      border-radius: 5px;
      padding: 3px 8px;
      margin: 3px 0;
      letter-spacing: 0.5px;
    }
    .tl1 { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
    .tl2 { background: #ffedd5; color: #c2410c; border: 1px solid #fed7aa; }
    .tl3 { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .tip { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .tdn { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

    /* Email */
    .es { font-size: 13.5px; font-weight: 600; color: var(--deep); margin-bottom: 3px; line-height: 1.4; }
    .ef { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
    .eb { font-size: 13px; color: #4b5c7a; line-height: 1.65; }
    .ed { font-size: 11px; color: #b0b8d4; margin-top: 6px; }

    /* Action block */
    .ab {
      background: linear-gradient(135deg, rgba(2,66,227,0.05) 0%, rgba(1,2,88,0.03) 100%);
      border-radius: 10px;
      padding: 14px 18px;
      border: 1px solid rgba(2,66,227,0.15);
      border-left: 4px solid var(--core);
    }
    .al {
      font-size: 10px;
      font-weight: 700;
      color: var(--core);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }
    .at { font-size: 13.5px; color: var(--deep); line-height: 1.7; font-weight: 500; }

    /* Links */
    .lnk {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 5px;
      padding: 2px 8px;
      margin-top: 5px;
      border: 1.5px solid;
      transition: opacity 0.15s;
    }
    .lnk:hover { opacity: 0.7; }

    .nd- { font-size: 12px; color: #b0b8d4; font-style: italic; }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 16px 0 40px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
      background: var(--white);
    }

    .footer-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 4px;
      font-weight: 600;
      color: var(--deep);
      font-size: 13px;
    }
  </style>
</head>

const hLabel = { green: 'Saludable', yellow: 'Atención', red: 'Riesgo' };
let currentFilter = 'all';

function renderStats() {
  document.getElementById('cnt-red').textContent = clients.filter(c => c.health === 'red').length;
  document.getElementById('cnt-yellow').textContent = clients.filter(c => c.health === 'yellow').length;
  document.getElementById('cnt-green').textContent = clients.filter(c => c.health === 'green').length;
}

function renderFilters() {
  const counts = {
    all: clients.length,
    red: clients.filter(c => c.health === 'red').length,
    yellow: clients.filter(c => c.health === 'yellow').length,
    green: clients.filter(c => c.health === 'green').length
  };
  document.getElementById('filters').innerHTML = [
    ['all', 'Todos', 'fa'],
    ['red', 'Riesgo', 'fr'],
    ['yellow', 'Atención', 'fy'],
    ['green', 'Saludables', 'fg']
  ].map(([v, l, cls]) =>
    `<button class="fb ${currentFilter === v ? cls : ''}" onclick="setFilter('${v}')">${l}<span class="bdg">${counts[v]}</span></button>`
  ).join('');
}

function setFilter(f) {
  currentFilter = f;
  renderFilters();
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('show', f === 'all' || c.dataset.health === f);
  });
}

function renderCards() {
  document.getElementById('cards').innerHTML = clients.map(c => {
    const hcls = c.health === 'green' ? 'hg' : c.health === 'red' ? 'hr' : 'hy';
    const hpcls = c.health === 'green' ? 'hpg' : c.health === 'red' ? 'hpr' : 'hpy';

    const newsHtml = c.news.map(n => `
      <div class="ni">
        <div class="nt">${n.title}</div>
        <div class="nd">${n.date}</div>
        <div class="ns">${n.summary}</div>
        ${lnk(n.url, 'Leer más', '#0242E3')}
      </div>`).join('');

    const riskHtml = c.riskAnalysis
      ? `<div class="ra"><div class="ra-lbl">⚠ Análisis renovación</div>${c.riskAnalysis}</div>`
      : '';

    const tkHtml = c.tickets.length > 0
      ? c.tickets.map(t => `
          <div class="tk">
            <div class="tt">${t.title}</div>
            <span class="${tbClass(t.status)}">${t.status}</span>
            ${lnk(t.url, 'Ver ticket', '#0242E3')}
          </div>`).join('')
      : `<div class="nd-">Sin tickets activos${c.linearUrl ? ' — ' + lnk(c.linearUrl, 'Ver en Linear', '#6b7a9e') : ''}</div>`;

    return `<div class="card show" data-health="${c.health}">
      <div class="ch ${hcls}">
        ${logo(c.domain, c.name)}
        <div style="flex:1;min-width:0">
          <div class="cn">${c.name}</div>
          <div class="cm">${c.sector} · ${c.city}</div>
        </div>
        <span class="hp ${hpcls}">${hLabel[c.health]}</span>
      </div>
      <div class="cb">
        <div class="sec two">
          <div class="box">
            <div class="lbl">📰 Últimas noticias</div>
            ${newsHtml}${riskHtml}
          </div>
          <div>
            <div class="lbl">✉️ Último email ${lnk(c.email.url, 'Gmail ↗', '#6b7a9e')}</div>
            <div class="es">${c.email.subject}</div>
            <div class="ef">${c.email.from}</div>
            <div class="eb">${c.email.summary}</div>
            <div class="ed">${c.email.date}</div>
          </div>
        </div>
        <div class="sec two">
          <div>
            <div class="lbl">🎫 Tickets SUPR ${c.linearUrl ? lnk(c.linearUrl, 'Ver todos', '#6b7a9e') : ''}</div>
            ${tkHtml}
          </div>
          <div>
            <div class="lbl" style="color:#0077b5">💼 LinkedIn ${lnk(c.linkedinUrl, 'Ver perfil', '#0077b5')}</div>
            <div class="txt">${c.linkedin}</div>
          </div>
        </div>
        <div class="ab">
          <div class="al">🎯 Acción CSM esta semana</div>
          <div class="at">${c.action}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

renderStats();
renderFilters();
renderCards();
</script>
