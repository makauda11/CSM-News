function inits(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}

function ticketBadgeClass(s){
  if(!s) return 'tb-other';
  const l = s.toLowerCase();
  if(l==='level 1') return 'tb-l1';
  if(l==='level 2') return 'tb-l2';
  if(l==='level 3') return 'tb-l3';
  if(l.includes('progress')) return 'tb-ip';
  if(l.includes('completed')||l.includes('resolved')) return 'tb-done';
  return 'tb-other';
}

  const hasL3 = openTickets.some(t=>t.status==='Level 3');
  const hasL2 = openTickets.some(t=>t.status==='Level 2');
  const hasL1 = openTickets.some(t=>t.status==='Level 1');
  const hasInProgress = openTickets.some(t=>t.status?.toLowerCase().includes('progress'));
  const riskNews = d.riskFromNews === true;

  if(hasL3 || riskNews || c.baseHealth==='red') return 'red';
  if(hasL2 || hasL1 || hasInProgress || c.baseHealth==='yellow') return 'yellow';
  return 'green';
}

function getWeek(){
  const n=new Date(), d=n.getDay(), diff=n.getDate()-d+(d===0?-6:1);
  const m=new Date(n); m.setDate(diff);
  return 'Semana del '+m.getDate()+' '+m.toLocaleString('es-ES',{month:'short'})+' '+m.getFullYear();
}

function linkBtn(href,label,color,ml=0){
  if(!href) return '';
  return `<a class="link-btn" href="${href}" target="_blank" rel="noopener noreferrer"
    style="color:${color};border-color:${color}22;background:${color}11;margin-left:${ml}px"
    onclick="event.preventDefault();window.open('${href}','_blank')">${label} ↗</a>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderStats(){
  const list = currentFilter==='all'?clients:clients.filter(c=>computeHealth(c)===currentFilter);
  const total = clients.length;
  const red = clients.filter(c=>computeHealth(c)==='red').length;
  const yellow = clients.filter(c=>computeHealth(c)==='yellow').length;
  const green = clients.filter(c=>computeHealth(c)==='green').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total cuentas</div><div class="stat-value">${total}</div><div class="stat-sub">High Touch</div></div>
    <div class="stat red"><div class="stat-label">En riesgo</div><div class="stat-value">${red}</div><div class="stat-sub">Requieren acción</div></div>
    <div class="stat yellow"><div class="stat-label">Atención</div><div class="stat-value">${yellow}</div><div class="stat-sub">Seguimiento activo</div></div>`;
}

function renderFilters(){
  const counts={all:clients.length,red:clients.filter(c=>computeHealth(c)==='red').length,yellow:clients.filter(c=>computeHealth(c)==='yellow').length,green:clients.filter(c=>computeHealth(c)==='green').length};
  document.getElementById('filters').innerHTML=[
    ['all','Todos','f-all'],['red','Riesgo','f-red'],['yellow','Atención','f-yellow'],['green','Saludables','f-green']
  ].map(([v,l,cls])=>
    `<button class="filter-btn ${currentFilter===v?cls:''}" onclick="setFilter('${v}')">${l}<span class="badge">${counts[v]}</span></button>`
  ).join('');
}

function setFilter(f){currentFilter=f;renderFilters();renderCards();}

function renderCards(){
  const list=currentFilter==='all'?clients:clients.filter(c=>computeHealth(c)===currentFilter);
  document.getElementById('cards').innerHTML=list.map(c=>renderCard(c)).join('');
}

// ─── LIVE DATA FETCH ──────────────────────────────────────────────────────────
async function callAnthropic(system, userMsg, mcp_servers=[], tools=[]){
  const body = {model:'claude-sonnet-4-20250514', max_tokens:1500,
    system, messages:[{role:'user',content:userMsg}]};
  if(mcp_servers.length) body.mcp_servers = mcp_servers;
  if(tools.length) body.tools = tools;
  const r = await fetch('https://api.anthropic.com/v1/messages',
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d = await r.json();
  return d.content?.filter(b=>b.type==='text').map(b=>b.text).join('') || '';
}

async function fetchNewsAndRisk(client){
  if(!liveData[client.id]) liveData[client.id] = {};
  liveData[client.id].newsLoading = true;
  renderCards();
  try {
    const raw = await callAnthropic(
      `You are a CSM analyst. Search for the 3 most recent news articles about the given company (last 3 months). 
       Also analyze if any news represents a risk for renewing their SaaS contract with Applivery (MDM/App Distribution software).
       Return ONLY valid JSON (no markdown) with this structure:
       {"news":[{"title":"...","date":"DD MMM YYYY","summary":"...","url":"..."}],"riskAnalysis":"...one sentence about renewal risk or null","riskFromNews":true/false}`,
      `Search news for: ${client.name} (${client.newsQuery}). Today is ${new Date().toLocaleDateString('es-ES')}.`,
      [], [{type:'web_search_20250305',name:'web_search'}]
    );
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    liveData[client.id].news = parsed.news || [];
    liveData[client.id].riskAnalysis = parsed.riskAnalysis || null;
    liveData[client.id].riskFromNews = parsed.riskFromNews || false;
  } catch(e) {
    liveData[client.id].news = [];
  }
  liveData[client.id].newsLoading = false;
}

async function fetchEmail(client){
  if(!liveData[client.id]) liveData[client.id] = {};
  try {
    const raw = await callAnthropic(
      `You are a CSM assistant. Search Gmail for the most recent email from the client's domain.
       Return ONLY valid JSON: {"subject":"...","from":"...","date":"DD MMM YYYY","summary":"...","url":"gmail deeplink or null"}`,
      `Search Gmail for most recent email from domain ${client.emailDomain} related to client ${client.name}.`,
      [{type:'url',url:'https://gmailmcp.googleapis.com/mcp/v1',name:'gmail-mcp'}]
    );
    const clean = raw.replace(/```json|```/g,'').trim();
    liveData[client.id].email = JSON.parse(clean);
  } catch(e) {}
}

async function fetchTickets(client){
  if(!liveData[client.id]) liveData[client.id] = {};
  liveData[client.id].ticketsLoading = true;
  renderCards();
  try {
    const raw = await callAnthropic(
      `You are a CSM assistant. Search Linear Support team (SUPR) for open issues related to the given customer.
       Return ONLY valid JSON array (no markdown): [{"id":"SUPR-XXX","title":"...","status":"Level 1|Level 2|Level 3|In Progress|Triage","url":"https://linear.app/applivery/issue/SUPR-XXX/..."}]
       Only include issues with status: Level 1, Level 2, Level 3, In Progress, Triage, Backlog. Exclude Completed, Resolved, Discarded.`,
      `Find all open support tickets in team SUPR for customer: ${client.name}. Customer Linear URL: ${client.linearCustomer||'search by name'}.`,
      [{type:'url',url:'https://mcp.linear.app/mcp',name:'linear-mcp'}]
    );
    const clean = raw.replace(/```json|```/g,'').trim();
    liveData[client.id].tickets = JSON.parse(clean);
  } catch(e) {
    liveData[client.id].tickets = [];
  }
  liveData[client.id].ticketsLoading = false;
}

async function refreshAll(){
  const btn = document.getElementById('refresh-btn');
  const lbl = document.getElementById('refresh-label');
  btn.classList.add('loading');
  lbl.textContent = 'Actualizando...';

  // Fetch all in parallel
  await Promise.all(clients.map(c =>
    Promise.all([
      fetchNewsAndRisk(c),
      fetchEmail(c),
      fetchTickets(c)
    ])
  ));

  lastUpdated = new Date();
  document.getElementById('last-updated').textContent =
    'Actualizado: ' + lastUpdated.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

  renderStats();
  renderFilters();
  renderCards();
  btn.classList.remove('loading');
  lbl.textContent = 'Actualizar datos';
}
