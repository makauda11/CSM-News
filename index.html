function lnk(href,label,color){
  if(!href) return '';
  return `<a class="lnk" href="${href}" target="_blank" rel="noopener" style="color:${color};border-color:${color}22;background:${color}11">${label} ↗</a>`;
}
function logo(domain,name){
  const ini=name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return `<div class="lw"><img src="https://logo.dev/${domain}?token=pk_V09GpPbCSk2tJGJhfEerXw" onerror="this.parentNode.className='li';this.parentNode.innerHTML='${ini}'" alt="${name}"></div>`;
}
function tbClass(s){
  if(!s) return 'tb tdn';
  const l=s.toLowerCase();
  if(l==='level 1') return 'tb tl1';
  if(l==='level 2') return 'tb tl2';
  if(l==='level 3') return 'tb tl3';
  if(l.includes('progress')||l.includes('triage')) return 'tb tip';
  return 'tb tdn';
}

const hLabel={green:'Saludable',yellow:'Atención',red:'Riesgo'};
let currentFilter='all';

function renderStats(){
  document.getElementById('cnt-red').textContent=clients.filter(c=>c.health==='red').length;
  document.getElementById('cnt-yellow').textContent=clients.filter(c=>c.health==='yellow').length;
}

function renderFilters(){
  const counts={all:clients.length,red:clients.filter(c=>c.health==='red').length,yellow:clients.filter(c=>c.health==='yellow').length,green:clients.filter(c=>c.health==='green').length};
  document.getElementById('filters').innerHTML=[
    ['all','Todos','fa'],['red','Riesgo','fr'],['yellow','Atención','fy'],['green','Saludables','fg']
  ].map(([v,l,cls])=>
    `<button class="fb ${currentFilter===v?cls:''}" onclick="setFilter('${v}')">${l}<span class="bdg">${counts[v]}</span></button>`
  ).join('');
}

function setFilter(f){currentFilter=f;renderFilters();document.querySelectorAll('.card').forEach(c=>{c.classList.toggle('show',f==='all'||c.dataset.health===f);});}

function renderCards(){
  document.getElementById('cards').innerHTML=clients.map(c=>{
    const hcls=c.health==='green'?'hg':c.health==='red'?'hr':'hy';
    const hpcls=c.health==='green'?'hpg':c.health==='red'?'hpr':'hpy';
    const newsHtml=c.news.map(n=>`<div class="ni"><div class="nt">${n.title}</div><div class="nd">${n.date}</div><div class="ns">${n.summary}</div>${lnk(n.url,'Leer más','#1E2EDE')}</div>`).join('');
    const riskHtml=c.riskAnalysis?`<div class="ra"><div class="ra-lbl">⚠ Análisis renovación</div>${c.riskAnalysis}</div>`:'';
    const tkHtml=c.tickets.length>0?c.tickets.map(t=>`<div class="tk"><div class="tt">${t.title}</div><span class="${tbClass(t.status)}">${t.status}</span>${lnk(t.url,'Ver ticket','#6b7fff')}</div>`).join(''):`<div class="nd-">Sin tickets activos${c.linearUrl?` — ${lnk(c.linearUrl,'Ver en Linear','#6b7fff')}`:''}.</div>`;
    const gmailUrl=`https://mail.google.com/mail/u/0/#search/from%3A${c.domain}`;
    return `<div class="card show" data-health="${c.health}">
      <div class="ch ${hcls}">
        ${logo(c.domain,c.name)}
        <div style="flex:1;min-width:0"><div class="cn">${c.name}</div><div class="cm">${c.sector} · ${c.city}</div></div>
        <span class="hp ${hpcls}">${hLabel[c.health]}</span>
      </div>
      <div class="cb">
        <div class="sec two">
          <div class="box"><div class="lbl">📰 Últimas noticias</div>${newsHtml}${riskHtml}</div>
          <div class="box">
            <div class="lbl">✉️ Último email ${lnk(c.email.url||gmailUrl,'Gmail','#555')}</div>
            <div class="es">${c.email.subject}</div>
            <div class="ef">${c.email.from}</div>
            <div class="eb">${c.email.summary}</div>
            <div class="ed">${c.email.date}</div>
          </div>
        </div>
        <div class="sec two">
          <div>
            <div class="lbl">🎫 Tickets SUPR ${c.linearUrl?lnk(c.linearUrl,'Ver todos','#6b7fff'):''}</div>
            ${tkHtml}
          </div>
          <div>
            <div class="lbl" style="color:#0ea5e9">💼 LinkedIn ${lnk(c.linkedinUrl,'Ver perfil','#0ea5e9')}</div>
            <div class="txt">${c.linkedin}</div>
          </div>
        </div>
        <div class="ab"><div class="al">🎯 Acción CSM esta semana</div><div class="at">${c.action}</div></div>
      </div>
    </div>`;
  }).join('');
}

renderStats();
renderFilters();
renderCards();
</script>
