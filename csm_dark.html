  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#0d0d0d;color:#e8e8e8;font-family:system-ui,-apple-system,sans-serif;-webkit-text-size-adjust:100%;min-height:100vh}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    /* Header */
    .header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid #1e1e1e;position:sticky;top:0;background:#0d0d0d;z-index:100}
    .header-logo{font-size:16px;font-weight:700;color:#1E2EDE;letter-spacing:-0.3px}
    .header-title{font-size:13px;color:#555;margin-left:16px}
    .header-left{display:flex;align-items:center;gap:0}
    .header-divider{width:1px;height:20px;background:#1e1e1e;margin:0 16px}
    .refresh-btn{background:#1E2EDE;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent}
    .refresh-btn:active{opacity:0.8}
    .refresh-btn.loading .spin{animation:spin 1s linear infinite}

    /* Stats bar */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#1a1a1a;border-bottom:1px solid #1a1a1a}
    .stat{background:#111;padding:16px 20px}
    .stat-label{font-size:9px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .stat-value{font-size:13px;font-weight:700;color:#e8e8e8}
    .stat-sub{font-size:11px;color:#555;margin-top:3px}
    .stat.red .stat-value{color:#ef4444}
    .stat.yellow .stat-value{color:#f59e0b}
    .stat.green .stat-value{color:#22c55e}

    /* Filters */
    .filters{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid #1a1a1a;background:#0d0d0d}
    .filters::-webkit-scrollbar{display:none}
    .filter-btn{background:transparent;color:#555;border:1px solid #1e1e1e;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:0.3px}
    .filter-btn.active{background:#1E2EDE;color:#fff;border-color:#1E2EDE}
    .filter-btn.active-red{background:rgba(239,68,68,0.15);color:#ef4444;border-color:rgba(239,68,68,0.3)}
    .filter-btn.active-yellow{background:rgba(245,158,11,0.15);color:#f59e0b;border-color:rgba(245,158,11,0.3)}
    .filter-btn.active-green{background:rgba(34,197,94,0.15);color:#22c55e;border-color:rgba(34,197,94,0.3)}
    .badge{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;background:#1a1a1a;color:#555}
    .filter-btn.active .badge{background:rgba(255,255,255,0.2);color:#fff}
    .filter-btn.active-red .badge{background:rgba(239,68,68,0.2);color:#ef4444}
    .filter-btn.active-yellow .badge{background:rgba(245,158,11,0.2);color:#f59e0b}
    .filter-btn.active-green .badge{background:rgba(34,197,94,0.2);color:#22c55e}

    /* Cards */
    .cards{padding:16px}
    .card{background:#111;border:1px solid #1e1e1e;border-radius:10px;margin-bottom:12px;overflow:hidden}
    .card:hover{border-color:#2a2a2a}

    /* Card header */
    .card-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1a1a1a;position:relative}
    .card-header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 0}
    .card-header.green::before{background:#22c55e}
    .card-header.yellow::before{background:#f59e0b}
    .card-header.red::before{background:#ef4444}
    .logo-wrap{width:36px;height:36px;border-radius:8px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:1px solid #222}
    .logo-wrap img{width:30px;height:30px;object-fit:contain}
    .logo-initials{width:36px;height:36px;border-radius:8px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#555;flex-shrink:0;border:1px solid #222}
    .client-name{font-weight:700;font-size:14px;color:#e8e8e8;line-height:1.2}
    .client-meta{font-size:11px;color:#555;margin-top:2px}
    .health-badge{font-size:10px;font-weight:600;border-radius:5px;padding:3px 8px;white-space:nowrap;flex-shrink:0;margin-left:auto;letter-spacing:0.3px}
    .health-green{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.2)}
    .health-yellow{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.2)}
    .health-red{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.2)}

    /* Card body */
    .card-body{padding:14px 16px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #1a1a1a}
    .row:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
    .row.single{grid-template-columns:1fr}
    .section-label{font-size:9px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .section-text{font-size:12px;color:#aaa;line-height:1.6}
    .section-text.white{color:#ccc}

    /* News box */
    .news-box{background:#0d0d0d;border-radius:8px;padding:10px 12px;border:1px solid #1a1a1a}
    .risk-box{background:#0d0d0d;border-radius:8px;padding:10px 12px;border:1px solid #1a1a1a}

    /* Ticket status */
    .ticket-id{font-size:12px;font-weight:600;color:#ccc;margin-bottom:4px;line-height:1.4}
    .ticket-status{display:inline-block;font-size:9px;font-weight:700;border-radius:4px;padding:2px 7px;letter-spacing:0.5px;margin:4px 0}
    .status-progress{background:rgba(30,46,222,0.15);color:#6b7fff;border:1px solid rgba(30,46,222,0.25)}
    .status-level{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.2)}
    .status-resolved{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.2)}
    .status-default{background:#1a1a1a;color:#555;border:1px solid #222}

    /* Email */
    .email-subject{font-size:12px;font-weight:600;color:#ccc;margin-bottom:3px;line-height:1.4}
    .email-from{font-size:11px;color:#444;margin-bottom:5px}
    .email-summary{font-size:12px;color:#888;line-height:1.5}
    .email-date{font-size:10px;color:#333;margin-top:5px}

    /* Action box */
    .action-box{background:#0d0d0d;border-radius:8px;padding:12px 14px;border-left:3px solid #1E2EDE;border-top:1px solid #1a1a1a;border-right:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a}
    .action-label{font-size:9px;font-weight:700;color:#1E2EDE;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
    .action-text{font-size:12.5px;color:#ccc;line-height:1.6;font-weight:500}

    /* Link button */
    .link-btn{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;text-decoration:none;border-radius:5px;padding:3px 8px;margin-top:6px;border:1px solid;letter-spacing:0.3px}
    .no-ticket{font-size:11px;color:#333;font-style:italic}

    .footer{text-align:center;font-size:10px;color:#2a2a2a;padding:12px 0 32px}
    .week-label{font-size:12px;color:#444;padding:10px 24px;border-bottom:1px solid #1a1a1a;background:#0d0d0d}
  </style>

function getWeek(){
  const n=new Date(2026,2,20),d=n.getDay(),diff=n.getDate()-d+(d===0?-6:1),m=new Date(n);
  m.setDate(diff);
  return 'Semana del '+m.getDate()+' '+m.toLocaleString('es-ES',{month:'short'})+' '+m.getFullYear();
}

function initials(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}

function ticketStatusClass(s){
  if(!s) return 'status-default';
  const l=s.toLowerCase();
  if(l.includes('progress')) return 'status-progress';
  if(l.includes('level')) return 'status-level';
  if(l.includes('resolved')||l.includes('completed')) return 'status-resolved';
  return 'status-default';
}

function linkBtn(href,label,color){
  if(!href) return '';
  return `<a class="link-btn" href="${href}" target="_blank" rel="noopener noreferrer" style="color:${color};border-color:${color}22;background:${color}11" onclick="event.preventDefault();window.open('${href}','_blank')">${label} ↗</a>`;
}

let currentFilter='all';
let liveEmails={};
let liveTickets={};

function renderStats(){
  const red=clients.filter(c=>c.health==='red').length;
  const yellow=clients.filter(c=>c.health==='yellow').length;
  const green=clients.filter(c=>c.health==='green').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total cuentas</div><div class="stat-value">${clients.length}</div><div class="stat-sub">High Touch</div></div>
    <div class="stat red"><div class="stat-label">En riesgo</div><div class="stat-value">${red}</div><div class="stat-sub">Requieren acción</div></div>
    <div class="stat yellow"><div class="stat-label">Atención</div><div class="stat-value">${yellow}</div><div class="stat-sub">Seguimiento activo</div></div>
  `;
}

function renderFilters(){
  const counts={all:clients.length,red:clients.filter(c=>c.health==='red').length,yellow:clients.filter(c=>c.health==='yellow').length,green:clients.filter(c=>c.health==='green').length};
  const btns=[
    ['all','Todos',currentFilter==='all'?'active':''],
    ['red','Riesgo',currentFilter==='red'?'active-red':''],
    ['yellow','Atención',currentFilter==='yellow'?'active-yellow':''],
    ['green','Saludables',currentFilter==='green'?'active-green':''],
  ];
  document.getElementById('filters').innerHTML=btns.map(([v,l,cls])=>
    `<button class="filter-btn ${cls}" onclick="setFilter('${v}')">${l}<span class="badge">${counts[v]}</span></button>`
  ).join('');
}

function setFilter(f){currentFilter=f;renderFilters();renderCards();}

function renderCards(){
  const list=currentFilter==='all'?clients:clients.filter(c=>c.health===currentFilter);
  document.getElementById('cards').innerHTML=list.map(c=>renderCard(c)).join('');
}

function renderCard(c){
  const email=liveEmails[c.id]||c.email;
  const ticket=liveTickets[c.id]||c.ticket;
  const ticketUrl=(liveTickets[c.id]&&liveTickets[c.id].url)||c.linearUrl;
  const logoHtml=`<div class="logo-wrap"><img src="https://logo.dev/${c.domain}?token=pk_V09GpPbCSk2tJGJhfEerXw" alt="${c.name}" onerror="this.parentNode.outerHTML='<div class=logo-initials>${initials(c.name)}</div>'"></div>`;

  return `<div class="card">
    <div class="card-header ${c.health}">
      ${logoHtml}
      <div style="flex:1;min-width:0">
        <div class="client-name">${c.name}</div>
        <div class="client-meta">${c.sector} · ${c.city}</div>
      </div>
      <span class="health-badge health-${c.health}">${hLabel[c.health]}</span>
    </div>
    <div class="card-body">
      <div class="row">
        <div class="news-box">
          <div class="section-label">📰 Noticias</div>
          <div class="section-text">${c.news}</div>
          ${linkBtn(c.newsUrl,'Leer más','#1E2EDE')}
        </div>
        <div class="risk-box">
          <div class="section-label" style="color:#f59e0b">⚠️ Alertas</div>
          <div class="section-text">${c.risk}</div>
        </div>
      </div>
      <div class="row single">
        <div class="section-label">📈 Tendencia del sector</div>
        <div class="section-text">${c.trend}</div>
      </div>
      <div class="row">
        <div>
          <div class="section-label">✉️ Último email</div>
          <div class="email-subject">${email.subject}</div>
          <div class="email-from">${email.from}</div>
          <div class="email-summary">${email.summary}</div>
          <div class="email-date">${email.date}</div>
        </div>
        <div>
          <div class="section-label">🎫 Ticket Linear</div>
          ${ticket
            ? `<div class="ticket-id">${ticket.title}</div>
               <span class="ticket-status ${ticketStatusClass(ticket.status)}">${ticket.status}</span>
               <div class="section-text" style="margin-top:4px">${ticket.desc||''}</div>
               ${linkBtn(ticketUrl,'Ver en Linear','#6b7fff')}`
            : '<div class="no-ticket">Sin tickets activos.</div>'
          }
        </div>
      </div>
      <div class="row single">
        <div class="section-label" style="color:#0ea5e9">💼 LinkedIn</div>
        <div class="section-text">${c.linkedin}</div>
        ${linkBtn(c.linkedinUrl,'Ver en LinkedIn','#0ea5e9')}
      </div>
      <div class="action-box">
        <div class="action-label">🎯 Acción CSM esta semana</div>
        <div class="action-text">${c.action}</div>
      </div>
    </div>
  </div>`;
}

async function fetchGmail(client){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'You are a CSM assistant. Search Gmail for the most recent email related to the given client. Return ONLY a JSON object with keys: subject, from, date, summary. No markdown.',
        messages:[{role:'user',content:'Search Gmail for the most recent email related to client: '+client.name+'. Return JSON.'}],
        mcp_servers:[{type:'url',url:'https://gmail.mcp.claude.com/mcp',name:'gmail-mcp'}]})});
    const d=await r.json();
    const t=d.content?.filter(b=>b.type==='text').map(b=>b.text).join('');
    liveEmails[client.id]=JSON.parse(t.replace(/```json|```/g,'').trim());
  }catch(e){}
}

async function fetchLinear(client){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'You are a CSM assistant. Search Linear for the most recent issue for the given client. Return ONLY a JSON object with keys: title, status, desc, url. No markdown.',
        messages:[{role:'user',content:'Search Linear for most recent issue for client: '+client.name+'. Return JSON.'}],
        mcp_servers:[{type:'url',url:'https://mcp.linear.app/mcp',name:'linear-mcp'}]})});
    const d=await r.json();
    const t=d.content?.filter(b=>b.type==='text').map(b=>b.text).join('');
    liveTickets[client.id]=JSON.parse(t.replace(/```json|```/g,'').trim());
  }catch(e){}
}

async function refreshAll(){
  const btn=document.getElementById('refresh-btn');
  const lbl=document.getElementById('refresh-label');
  btn.classList.add('loading');lbl.textContent='Actualizando...';
  await Promise.all(clients.map(c=>Promise.all([fetchGmail(c),fetchLinear(c)])));
  renderCards();
  btn.classList.remove('loading');lbl.textContent='Actualizar datos';
}

// Init
document.getElementById('week-label').textContent=getWeek()+' · Jorge Macauda';
renderStats();
renderFilters();
renderCards();
</script>
